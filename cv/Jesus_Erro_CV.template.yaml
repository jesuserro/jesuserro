    projects:
      - name: AI-Powered Dotfiles | Developer Environment as Code
        start_date: 2026-01
        summary: AI-augmented developer workstation built as code for reusable, secure, and production-oriented engineering workflows. Repository https://github.com/jesuserro/dotfiles
        highlights:
          - **Action:** Designed and developed an AI-augmented developer workstation across Cursor, Codex, and Claude.
          - **Context:** Built a dotfiles repository combining MCP-based AI assistants, reusable agent skills, and declarative workstation setup with Chezmoi, SOPS, and Age.
          - **Result:** Created a more traceable, maintainable, and scalable developer environment for infrastructure, observability, automation, and AI-assisted workflows.

      - name: Automated Books Pipeline | Medallion MDM ETL
        start_date: 2025-04
        summary: Modern books data platform for multi-source ingestion, enrichment, and serving using incremental ETL and lakehouse architecture. Repository https://github.com/jesuserro/books-etl-pipeline
        highlights:
          - **Action:** Designed and developed a modern books data platform to ingest, enrich, and serve multi-source book data through incremental pipelines and lakehouse-based architecture.
          - **Context:** Built with Python and Dagster using a medallion model (RAW → SRC → MDM → GOLD), Apache Iceberg, PostgreSQL, Trino, FastAPI, and observability tooling including OpenTelemetry, Prometheus, and Grafana.
          - **Result:** Created a more traceable, maintainable, and scalable data platform with reliable identity resolution, reproducible transformations, and production-style data engineering practices.

