        highlights:
          - **Action:** Built multilabel tagging pipelines with SentenceTransformers and Logistic Regression.
          - **Context:** Applied VADER and RoBERTa models for sentiment and emotion analysis on book descriptions.
          - **Result:** Developed semantic discovery workflows with Streamlit, TensorFlow, Keras, and clustering techniques.

